<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karma Tara Residency - Pro Purchase V3.1</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #1f6b46;
      --brand-light: #edf7f1;
      --accent: #d99100;
      --danger: #dc2626;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 40px; }
    .hidden { display: none !important; }
    .wrap { max-width: 600px; margin: 0 auto; padding: 16px; }
    
    /* UI Components */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; border: 1px solid var(--line); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 1.25rem; margin: 0; color: var(--brand); }
    h2 { font-size: 1rem; margin: 0 0 12px; border-left: 4px solid var(--brand); padding-left: 10px; }
    
    /* Forms */
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
    input, select, textarea { 
      width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; 
      font-size: 1rem; margin-bottom: 12px; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--brand); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    
    /* Buttons */
    .btn { 
      border: none; border-radius: 12px; padding: 14px; font-weight: 700; 
      cursor: pointer; width: 100%; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--brand); color: white; }
    .btn-outline { background: white; border: 1px solid var(--line); color: var(--text); }
    .btn-whatsapp { background: #25D366; color: white; }
    .btn-danger { background: #fee2e2; color: var(--danger); }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
    .stat-box { background: var(--brand-light); padding: 10px; border-radius: 12px; }
    .stat-val { display: block; font-size: 1.1rem; font-weight: 800; color: var(--brand); }
    .stat-lab { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); }

    /* Purchase List */
    .entry { border-bottom: 1px solid var(--line); padding: 12px 0; }
    .entry:last-child { border: none; }
    .entry-top { display: flex; justify-content: space-between; font-weight: 700; }
    .entry-sub { font-size: 0.8rem; color: var(--muted); }
    .entry-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-top: 8px; border: 1px solid var(--line); }

    /* OCR/Scan */
    .scan-preview { position: relative; margin-top: 10px; text-align: center; }
    .scan-preview img { max-width: 100%; border-radius: 12px; border: 1px solid var(--line); }
    #ocrStatus { font-size: 0.8rem; color: var(--brand); margin: 8px 0; font-style: italic; }
  </style>
</head>
<body>

<div id="loginSection" class="wrap">
  <div class="card" style="margin-top: 50px;">
    <h1 style="text-align:center; margin-bottom: 20px;">KTR Login</h1>
    <label>Staff Member</label>
    <select id="loginStaff"></select>
    <label>4-Digit PIN</label>
    <input type="password" id="loginPin" inputmode="numeric" maxlength="4" placeholder="••••">
    <button class="btn btn-primary" onclick="handleLogin()">Login</button>
    <p id="loginError" style="color: var(--danger); font-size: 0.8rem; text-align: center;"></p>
  </div>
</div>

<div id="appSection" class="wrap hidden">
  <div class="header">
    <div>
      <h1 id="userGreeting">Namaste</h1>
      <small id="currentDate" style="color: var(--muted)"></small>
    </div>
    <button class="btn btn-outline" style="width: auto; padding: 8px 15px;" onclick="handleLogout()">Logout</button>
  </div>

  <div class="card">
    <div class="stats-row">
      <div class="stat-box"><span class="stat-lab">Count</span><span class="stat-val" id="statCount">0</span></div>
      <div class="stat-box"><span class="stat-lab">Tax (Rs)</span><span class="stat-val" id="statTax">0</span></div>
      <div class="stat-box"><span class="stat-lab">Local (Rs)</span><span class="stat-val" id="statLocal">0</span></div>
    </div>
  </div>

  <div class="card">
    <h2>New Purchase</h2>
    <div class="grid2">
      <div><label>Store Name</label><input id="storeName" placeholder="Ex: Bhatbhateni"></div>
      <div><label>Category</label><select id="category"></select></div>
    </div>
    
    <div class="grid2">
      <div><label>Particular</label><input id="particular" placeholder="Details"></div>
      <div><label>Amount (Rs)</label><input type="number" id="amount" placeholder="0.00"></div>
    </div>

    <label>Bill Photo</label>
    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="processFile(event)">
    <div class="grid2" style="margin-bottom: 12px;">
      <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📷 Take Photo</button>
      <button class="btn btn-outline" id="ocrBtn" onclick="runOCR()" disabled>🔍 Read Bill</button>
    </div>

    <div id="scanPreview" class="scan-preview hidden">
      <img id="previewImg" src="">
      <div id="ocrStatus"></div>
    </div>

    <div class="grid2">
      <button class="btn btn-outline" id="btnLocal" onclick="setBillType('Local Bill')" style="border-color: var(--brand)">Local Bill</button>
      <button class="btn btn-outline" id="btnTax" onclick="setBillType('Tax Bill')">Tax Bill</button>
    </div>
    <button class="btn btn-primary" style="margin-top: 15px;" onclick="submitPurchase()">Add Purchase</button>
  </div>

  <!-- Only visible to Sonam -->
  <div class="card hidden" id="adminPanel">
    <h2>Admin: Manage Staff & PINs</h2>
    <div id="staffListDisplay" style="font-size: 0.85rem; margin-bottom: 12px; color: var(--muted);"></div>
    
    <label>Add New Staff</label>
    <div class="grid2">
      <input id="newStaffName" placeholder="Staff Name">
      <input id="newStaffPin" placeholder="4-Digit PIN" maxlength="4" inputmode="numeric">
    </div>
    <button class="btn btn-outline" style="margin-bottom: 15px;" onclick="addNewStaff()">+ Add Staff</button>

    <label>Change Existing PIN</label>
    <div class="grid2">
      <select id="pinChangeStaff"></select>
      <input id="newPinUpdate" placeholder="New PIN" maxlength="4" inputmode="numeric">
    </div>
    <button class="btn btn-outline" onclick="updateStaffPin()">Update PIN</button>
  </div>

  <div class="card">
    <h2>Today's History</h2>
    <div id="historyList"></div>
  </div>

  <div class="card">
    <h2>Report</h2>
    <button class="btn btn-whatsapp" onclick="sendWhatsApp()">Send to WhatsApp</button>
    <button class="btn btn-danger" style="margin-top: 10px;" onclick="clearData()">Clear Today's Data</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  const DB_NAME = "KTR_Purchase_DB";
  const DB_VERSION = 1;
  const STORE_NAME = "purchases";
  const CATS = ['Select...','Kitchen','Water','Staff Meal','Electricity','Fuel','Supply','Cleaning','Other'];
  
  let db;
  let currentUser = null;
  let currentBillType = "Local Bill";
  let tempImage = null;
  
  // Internal staff storage
  let staffData = JSON.parse(localStorage.getItem('ktr_staff_v3')) || { 
    "Sonam": {pin:"9999", admin:true}, 
    "Amar": {pin:"1111", admin:false},
    "Kul Bdr.": {pin:"2222", admin:false},
    "Raman": {pin:"3333", admin:false}
  };

  function init() {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = (e) => {
      db = e.target.result;
      renderLoginList();
      populateSelect('category', CATS);
    };
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-NP');
  }

  function renderLoginList() {
    const sel = document.getElementById('loginStaff');
    sel.innerHTML = Object.keys(staffData).map(s => `<option value="${s}">${s}</option>`).join('');
  }

  function handleLogin() {
    const user = document.getElementById('loginStaff').value;
    const pin = document.getElementById('loginPin').value;
    if (staffData[user] && staffData[user].pin === pin) {
      currentUser = user;
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('appSection').classList.remove('hidden');
      document.getElementById('userGreeting').innerText = `Namaste, ${user}`;
      
      // ADMIN CHECK: Only Sonam can see Admin Tools[cite: 1]
      if(user === "Sonam") {
        document.getElementById('adminPanel').classList.remove('hidden');
        renderAdminTools();
      }
      
      refreshUI();
    } else {
      document.getElementById('loginError').innerText = "Incorrect PIN";
    }
  }

  function handleLogout() { location.reload(); }

  // Admin Functions[cite: 1]
  function renderAdminTools() {
    const listDiv = document.getElementById('staffListDisplay');
    const pinSel = document.getElementById('pinChangeStaff');
    
    const staffNames = Object.keys(staffData);
    listDiv.innerText = "Current Staff: " + staffNames.join(", ");
    pinSel.innerHTML = staffNames.map(s => `<option value="${s}">${s}</option>`).join('');
  }

  function addNewStaff() {
    const name = document.getElementById('newStaffName').value.trim();
    const pin = document.getElementById('newStaffPin').value.trim();
    if(!name || pin.length !== 4) return alert("Enter valid name and 4-digit PIN");
    staffData[name] = {pin: pin, admin: false};
    saveStaff();
    alert("Staff Added");
    document.getElementById('newStaffName').value = "";
    document.getElementById('newStaffPin').value = "";
    renderAdminTools();
  }

  function updateStaffPin() {
    const name = document.getElementById('pinChangeStaff').value;
    const pin = document.getElementById('newPinUpdate').value.trim();
    if(pin.length !== 4) return alert("Enter 4-digit PIN");
    staffData[name].pin = pin;
    saveStaff();
    alert("PIN Updated");
    document.getElementById('newPinUpdate').value = "";
  }

  function saveStaff() {
    localStorage.setItem('ktr_staff_v3', JSON.stringify(staffData));
  }

  // Purchase Logic[cite: 1]
  function setBillType(type) {
    currentBillType = type;
    document.getElementById('btnLocal').style.borderColor = type === "Local Bill" ? "var(--brand)" : "var(--line)";
    document.getElementById('btnTax').style.borderColor = type === "Tax Bill" ? "var(--brand)" : "var(--line)";
  }

  async function processFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      tempImage = event.target.result;
      document.getElementById('previewImg').src = tempImage;
      document.getElementById('scanPreview').classList.remove('hidden');
      document.getElementById('ocrBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  async function runOCR() {
    const status = document.getElementById('ocrStatus');
    status.innerText = "Reading bill details...";
    try {
      const result = await Tesseract.recognize(tempImage, 'eng');
      const text = result.data.text.toLowerCase();
      const amounts = text.match(/\d+(\.\d{1,2})?/g);
      if(amounts) document.getElementById('amount').value = Math.max(...amounts.map(Number));
      status.innerText = "Check parsed amount & edit if needed.";
    } catch (e) {
      status.innerText = "OCR Failed. Please enter manually.";
    }
  }

  function submitPurchase() {
    const store = document.getElementById('storeName').value;
    const part = document.getElementById('particular').value;
    const amt = document.getElementById('amount').value;
    const cat = document.getElementById('category').value;
    
    if(!store || !amt || cat === 'Select...') return alert("Please fill all fields");

    const entry = {
      store, particular: part, amount: Number(amt), category: cat,
      staff: currentUser, type: currentBillType,
      photo: tempImage, date: new Date().toISOString().split('T')[0],
      time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };

    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).add(entry);
    tx.oncomplete = () => {
      resetForm();
      refreshUI();
    };
  }

  function resetForm() {
    document.getElementById('storeName').value = "";
    document.getElementById('particular').value = "";
    document.getElementById('amount').value = "";
    document.getElementById('category').selectedIndex = 0;
    document.getElementById('scanPreview').classList.add('hidden');
    tempImage = null;
  }

  async function refreshUI() {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.getAll();
    
    request.onsuccess = () => {
      const data = request.result.filter(i => i.date === new Date().toISOString().split('T')[0]);
      let tax = 0, local = 0;
      
      const html = data.reverse().map(item => {
        if(item.type === "Tax Bill") tax += item.amount; else local += item.amount;
        return `
          <div class="entry">
            <div class="entry-top"><span>${item.store}</span><span>Rs. ${item.amount}</span></div>
            <div class="entry-sub">${item.category} • ${item.particular || 'No details'} • ${item.type} • ${item.staff} • ${item.time}</div>
            ${item.photo ? `<img src="${item.photo}" class="entry-img">` : ''}
          </div>
        `;
      }).join('');

      document.getElementById('historyList').innerHTML = html || "No purchases today.";
      document.getElementById('statCount').innerText = data.length;
      document.getElementById('statTax').innerText = tax;
      document.getElementById('statLocal').innerText = local;
    };
  }

  function populateSelect(id, list) {
    document.getElementById(id).innerHTML = list.map(i => `<option value="${i}">${i}</option>`).join('');
  }

  function sendWhatsApp() {
    const tax = document.getElementById('statTax').innerText;
    const local = document.getElementById('statLocal').innerText;
    const msg = `KTR Daily Report (${new Date().toLocaleDateString()})\nTax Bills: Rs. ${tax}\nLocal Bills: Rs. ${local}\nTotal: Rs. ${Number(tax)+Number(local)}`;
    window.open(`https://wa.me/9779808121644?text=${encodeURIComponent(msg)}`);
  }

  function clearData() {
    if(confirm("Are you sure? This deletes today's records.")) {
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).clear();
      tx.oncomplete = () => refreshUI();
    }
  }

  init();
</script>
</body>
</html>
